function filterShop(c,btn){
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const items=c==='All'?PRODS:PRODS.filter(p=>p.origin===c);
  document.getElementById('shop-grid').innerHTML=items.map(p=>`
    <div class="sh-card">
      <div class="sh-img"><img src="${p.img}" alt="${p.name}"/><span class="in-stock">In Stock</span></div>
      <div class="sh-body">
        <h4>${p.name}</h4>
        <div class="sh-origin">${p.origin}</div>
        <div class="sh-pr-row">
          <div class="sh-price">₱${p.price.toFixed(2)} <span>/ kit</span></div>
          <button class="sh-plus" onclick="addToCart('${p.id}','${p.name}',${p.price},'${p.emoji}')">+</button>
        </div>
        <button class="add-btn" data-id="${p.id}" onclick="addToCart('${p.id}','${p.name}',${p.price},'${p.emoji}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          Add to Cart
        </button>
      </div>
    </div>`).join('');
}
filterShop('All',document.querySelector('.ftab.on'));
</script>

<div class="cart-ov" id="cart-ov" onclick="closeCart()"></div>
<aside class="cart-sb" id="cart-sb">
  <div class="cart-hd"><span>Shopping Cart</span><button onclick="closeCart()">✕</button></div>
  <div class="cart-items" id="cart-items"><p class="cart-empty">Your cart is empty.</p></div>
  <div class="cart-ft">
    <div class="cart-total">Total: <span id="cart-total">₱0.00</span></div>
    <button class="btn-p" style="width:100%;text-align:center;padding:12px" onclick="doCheckout()">Checkout</button>
  </div>
</aside>
<footer><p>© 2026 WTF – What The Food. All rights reserved.</p></footer>
<script>
let cart=JSON.parse(localStorage.getItem('wtf_cart')||'[]');
let txLog=JSON.parse(localStorage.getItem('wtf_log')||'[]');
let txHist=JSON.parse(localStorage.getItem('wtf_hist')||'[]');
function saveAll(){localStorage.setItem('wtf_cart',JSON.stringify(cart));localStorage.setItem('wtf_log',JSON.stringify(txLog));localStorage.setItem('wtf_hist',JSON.stringify(txHist));}
function ts(){return new Date().toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function dateStr(){return new Date().toLocaleDateString('en-PH',{year:'numeric',month:'short',day:'numeric'})+' '+ts();}
function addLog(type,text,amount){txLog.unshift({type,text,amount,time:ts(),date:dateStr()});if(txLog.length>100)txLog.pop();saveAll();}
function addToCart(id,name,price,emoji){
  const ex=cart.find(i=>i.id===id);
  if(ex){ex.qty++;addLog('update','Increased qty: '+name,'₱'+(price*ex.qty).toFixed(2));}
  else{cart.push({id,name,price,emoji,qty:1});addLog('add','Added to cart: '+name,'₱'+price.toFixed(2));}
  saveAll();updateCount();renderCart();
  const b=document.querySelector('[data-id="'+id+'"]');
  if(b){const old=b.innerHTML;b.innerHTML='✓ Added';setTimeout(()=>b.innerHTML=old,1400);}
}
function removeFromCart(id){const it=cart.find(i=>i.id===id);if(it)addLog('remove','Removed: '+it.name,'');cart=cart.filter(i=>i.id!==id);saveAll();updateCount();renderCart();}
function changeQty(id,d){const it=cart.find(i=>i.id===id);if(!it)return;it.qty+=d;if(it.qty<=0){addLog('remove','Removed: '+it.name,'');cart=cart.filter(i=>i.id!==id);}else addLog('update','Qty: '+it.name+' → '+it.qty,'₱'+(it.price*it.qty).toFixed(2));saveAll();updateCount();renderCart();}
function doCheckout(){
  if(!cart.length){alert('Your cart is empty!');return;}
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const txId='TXN-'+Date.now().toString().slice(-6);
  const items=cart.map(i=>i.name+' x'+i.qty).join(', ');
  txHist.unshift({id:txId,date:dateStr(),items,total,status:'Completed'});
  addLog('checkout','Checkout: '+txId,'₱'+total.toFixed(2));
  cart=[];saveAll();updateCount();renderCart();closeCart();
  alert('Order placed! Transaction ID: '+txId);
}
function updateCount(){const n=cart.reduce((s,i)=>s+i.qty,0);document.querySelectorAll('#cart-count').forEach(e=>e.textContent=n);}
function renderCart(){
  const el=document.getElementById('cart-items');if(!el)return;
  const tot=document.getElementById('cart-total');
  if(!cart.length){el.innerHTML='<p class="cart-empty">Your cart is empty.</p>';if(tot)tot.textContent='₱0.00';return;}
  el.innerHTML=cart.map(i=>`<div class="ci"><div class="ci-thumb">${i.emoji}</div><div class="ci-info"><div class="ci-name">${i.name}</div><div class="ci-price">₱${i.price.toFixed(2)}</div></div><div class="ci-qty"><button onclick="changeQty('${i.id}',-1)">−</button><span>${i.qty}</span><button onclick="changeQty('${i.id}',1)">+</button></div><button class="ci-del" onclick="removeFromCart('${i.id}')">🗑</button></div>`).join('');
  const t=cart.reduce((s,i)=>s+i.price*i.qty,0);if(tot)tot.textContent='₱'+t.toFixed(2);
}
function openCart(){document.getElementById('cart-sb').classList.add('on');document.getElementById('cart-ov').classList.add('on');renderCart();}
function closeCart(){document.getElementById('cart-sb').classList.remove('on');document.getElementById('cart-ov').classList.remove('on');}
updateCount();renderCart();
</script>
</body>
</html>
