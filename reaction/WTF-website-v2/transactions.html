<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Transactions – WTF</title>
<link rel="stylesheet" href="s.css"/>
</head>
<body>
<nav>
  <a class="nav-brand" href="index.html"><b>WTF</b><span>What The Food</span></a>
  <ul>
    <li><a href="index.html" id="nl-home">Home</a></li>
    <li><a href="plan.html" id="nl-plan">Plan My Meals</a></li>
    <li><a href="recipes.html" id="nl-rec">Recipes</a></li>
    <li><a href="shop.html" id="nl-shop">Shop</a></li>
    <li><a href="about.html" id="nl-about">About</a></li>
    <li><a href="transactions.html" id="nl-tx" class="on">Transactions</a></li>
  </ul>
  <div class="nav-r">
    <button class="cart-ico" onclick="openCart()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span class="badge" id="cart-count">0</span>
    </button>
    <a href="login.html" class="btn-login">Login</a>
  </div>
</nav>

<div class="pg-head">
  <h1>Transactions</h1>
  <p>Your order history and activity log</p>
</div>

<div class="tx-wrap">
  <!-- Summary cards -->
  <div class="tx-summary" id="tx-summary"></div>

  <!-- Tabs -->
  <div class="tx-tabs">
    <button class="tx-tab on" onclick="showTab('history',this)">📋 Transaction History</button>
    <button class="tx-tab" onclick="showTab('log',this)">🔍 Transaction Log</button>
  </div>

  <!-- HISTORY TAB -->
  <div id="tab-history">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span style="font-size:13px;color:var(--mid)" id="hist-count"></span>
      <button class="clear-log" onclick="clearHist()">Clear History</button>
    </div>
    <div class="tx-table-wrap">
      <table class="tx-table">
        <thead>
          <tr>
            <th>Transaction ID</th>
            <th>Date</th>
            <th>Items</th>
            <th>Total</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="hist-body"></tbody>
      </table>
    </div>
  </div>

  <!-- LOG TAB -->
  <div id="tab-log" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span style="font-size:13px;color:var(--mid)" id="log-count"></span>
      <button class="clear-log" onclick="clearLog()">Clear Log</button>
    </div>
    <div class="tx-table-wrap" style="padding:0 20px">
      <div id="log-body"></div>
    </div>
  </div>
</div>

<!-- CART -->
<div class="cart-ov" id="cart-ov" onclick="closeCart()"></div>
<aside class="cart-sb" id="cart-sb">
  <div class="cart-hd"><span>Shopping Cart</span><button onclick="closeCart()">✕</button></div>
  <div class="cart-items" id="cart-items"><p class="cart-empty">Your cart is empty.</p></div>
  <div class="cart-ft">
    <div class="cart-total">Total: <span id="cart-total">₱0.00</span></div>
    <button class="btn-p" style="width:100%;text-align:center;padding:12px" onclick="doCheckout()">Checkout</button>
  </div>
</aside>

<footer><p>© 2026 WTF – What The Food. All rights reserved.</p></footer>

<script>
let cart=JSON.parse(localStorage.getItem('wtf_cart')||'[]');
let txLog=JSON.parse(localStorage.getItem('wtf_log')||'[]');
let txHist=JSON.parse(localStorage.getItem('wtf_hist')||'[]');
function saveAll(){localStorage.setItem('wtf_cart',JSON.stringify(cart));localStorage.setItem('wtf_log',JSON.stringify(txLog));localStorage.setItem('wtf_hist',JSON.stringify(txHist));}
function ts(){return new Date().toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function dateStr(){return new Date().toLocaleDateString('en-PH',{year:'numeric',month:'short',day:'numeric'})+' '+ts();}
function addLog(type,text,amount){txLog.unshift({type,text,amount,time:ts(),date:dateStr()});if(txLog.length>100)txLog.pop();saveAll();}
function addToCart(id,name,price,emoji){const ex=cart.find(i=>i.id===id);if(ex){ex.qty++;addLog('update','Increased qty: '+name,'₱'+(price*ex.qty).toFixed(2));}else{cart.push({id,name,price,emoji,qty:1});addLog('add','Added: '+name,'₱'+price.toFixed(2));}saveAll();updateCount();renderCart();}
function removeFromCart(id){const it=cart.find(i=>i.id===id);if(it)addLog('remove','Removed: '+it.name,'');cart=cart.filter(i=>i.id!==id);saveAll();updateCount();renderCart();}
function changeQty(id,d){const it=cart.find(i=>i.id===id);if(!it)return;it.qty+=d;if(it.qty<=0){addLog('remove','Removed: '+it.name,'');cart=cart.filter(i=>i.id!==id);}else addLog('update','Qty: '+it.name+' → '+it.qty,'₱'+(it.price*it.qty).toFixed(2));saveAll();updateCount();renderCart();}
function doCheckout(){if(!cart.length){alert('Cart is empty!');return;}const total=cart.reduce((s,i)=>s+i.price*i.qty,0);const txId='TXN-'+Date.now().toString().slice(-6);const items=cart.map(i=>i.name+' x'+i.qty).join(', ');txHist.unshift({id:txId,date:dateStr(),items,total,status:'Completed'});addLog('checkout','Checkout: '+txId,'₱'+total.toFixed(2));cart=[];saveAll();updateCount();renderCart();closeCart();renderAll();alert('Order placed! Transaction ID: '+txId);}
function updateCount(){const n=cart.reduce((s,i)=>s+i.qty,0);document.querySelectorAll('#cart-count').forEach(e=>e.textContent=n);}
function renderCart(){const el=document.getElementById('cart-items');if(!el)return;const tot=document.getElementById('cart-total');if(!cart.length){el.innerHTML='<p class="cart-empty">Your cart is empty.</p>';if(tot)tot.textContent='₱0.00';return;}el.innerHTML=cart.map(i=>`<div class="ci"><div class="ci-thumb">${i.emoji}</div><div class="ci-info"><div class="ci-name">${i.name}</div><div class="ci-price">₱${i.price.toFixed(2)}</div></div><div class="ci-qty"><button onclick="changeQty('${i.id}',-1)">−</button><span>${i.qty}</span><button onclick="changeQty('${i.id}',1)">+</button></div><button class="ci-del" onclick="removeFromCart('${i.id}')">🗑</button></div>`).join('');const t=cart.reduce((s,i)=>s+i.price*i.qty,0);if(tot)tot.textContent='₱'+t.toFixed(2);}
function openCart(){document.getElementById('cart-sb').classList.add('on');document.getElementById('cart-ov').classList.add('on');renderCart();}
function closeCart(){document.getElementById('cart-sb').classList.remove('on');document.getElementById('cart-ov').classList.remove('on');}

function showTab(id, btn){
  document.querySelectorAll('.tx-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('tab-history').style.display = id==='history'?'block':'none';
  document.getElementById('tab-log').style.display     = id==='log'?'block':'none';
}

const stClass={Completed:'st-completed',Pending:'st-pending',Cancelled:'st-cancelled'};
const dotClass={add:'add',remove:'remove',checkout:'checkout',update:'update'};

function renderAll(){
  // Summary
  const totalSpend = txHist.reduce((s,t)=>s+t.total,0);
  const totalOrders = txHist.length;
  const totalItems = txHist.reduce((s,t)=>s+(t.items.match(/x\d+/g)||[]).reduce((a,x)=>a+parseInt(x.slice(1)),0),0);
  const avgOrder = totalOrders ? (totalSpend/totalOrders) : 0;
  document.getElementById('tx-summary').innerHTML = `
    <div class="tx-sum-card"><div class="tx-sum-val">${totalOrders}</div><div class="tx-sum-lbl">Total Orders</div></div>
    <div class="tx-sum-card"><div class="tx-sum-val">₱${totalSpend.toFixed(2)}</div><div class="tx-sum-lbl">Total Spent</div></div>
    <div class="tx-sum-card"><div class="tx-sum-val">${totalItems}</div><div class="tx-sum-lbl">Items Bought</div></div>
    <div class="tx-sum-card"><div class="tx-sum-val">₱${avgOrder.toFixed(2)}</div><div class="tx-sum-lbl">Avg. Order</div></div>`;

  // History table
  document.getElementById('hist-count').textContent = txHist.length + ' transaction' + (txHist.length!==1?'s':'');
  document.getElementById('hist-body').innerHTML = txHist.length ? txHist.map(t=>`
    <tr>
      <td class="tx-id">${t.id}</td>
      <td>${t.date}</td>
      <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${t.items}">${t.items}</td>
      <td style="font-weight:600">₱${t.total.toFixed(2)}</td>
      <td><span class="status-badge ${stClass[t.status]||'st-completed'}">${t.status}</span></td>
    </tr>`).join('')
  : '<tr><td colspan="5" class="tx-empty">No transactions yet. Start shopping!</td></tr>';

  // Log
  document.getElementById('log-count').textContent = txLog.length + ' event' + (txLog.length!==1?'s':'');
  document.getElementById('log-body').innerHTML = txLog.length ? txLog.map(e=>`
    <div class="log-entry">
      <div class="log-dot ${dotClass[e.type]||'update'}"></div>
      <div class="log-time">${e.time}</div>
      <div style="flex:1"><div class="log-txt">${e.text}</div>${e.amount?`<div class="log-amount">${e.amount}</div>`:''}</div>
      <div style="font-size:11px;color:var(--mid)">${e.date.split(' ')[0]}</div>
    </div>`).join('')
  : '<p style="text-align:center;padding:40px;color:var(--mid);font-size:13px">No activity logged yet.</p>';
}

function clearLog(){if(confirm('Clear all log entries?')){txLog=[];saveAll();renderAll();}}
function clearHist(){if(confirm('Clear all transaction history?')){txHist=[];saveAll();renderAll();}}

updateCount(); renderCart(); renderAll();
</script>
</body>
</html>
